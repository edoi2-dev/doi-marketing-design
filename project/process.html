  return (
    <section className="doi-reveal" style={{ borderBottom: '1px solid var(--border)' }}>
      <div className="doi-container" style={{ padding: 'var(--section-pad-y) var(--section-pad-x)' }}>

            <div style={{ display: 'flex', alignItems: 'baseline', gap: 'var(--space-5)' }}>
              <span style={{ fontFamily: 'var(--font-display)', fontSize: 'var(--text-number)', lineHeight: 0.9, color: 'var(--crimson)' }}>{s.n}</span>
              <h2 className="doi-display" style={{ fontSize: 'clamp(2rem, 3vw, 3rem)', margin: 0 }}>{s.t}</h2>

            <div>

                  </li>
                ))}
              </ul>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

    { t: 'Notion', d: 'A shared dashboard with the roadmap, work in progress, and reporting. Always current, always visible.' },
    { t: 'One Call', d: 'A single 60-minute strategy call each month. Focused, prepared, and worth the hour. No standing weekly meetings.' },
  ];
  return (
    <section className="doi-reveal" style={{ borderBottom: '1px solid var(--border)', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', width: 620, height: 620, left: '50%', top: '-34%', transform: 'translateX(-50%)', background: 'var(--glow-crimson)' }} />
      <div className="doi-container" style={{ position: 'relative', padding: 'var(--section-pad-y) var(--section-pad-x)' }}>
        <SectionHeading eyebrow="How we work together" title="Async-first." emphasis="No micromanagement." variant="display" align="center" style={{ alignItems: 'center', margin: '0 auto var(--space-8)' }} />
        <div className="doi-grid-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 'var(--space-5)' }}>
          {tools.map((it) => (
            <div key={it.t} style={{ padding: 'var(--space-7) var(--space-6)', border: '1px solid var(--border)', background: 'var(--surface-1)' }}>

}

function Expect() {

    { k: 'Month 1 close', v: 'Strategy call, reporting, and the plan for month two.' },
    { k: 'Ongoing', v: 'Compounding systems, monthly reviews, no weekly calls.' },
  ];
  return (
    <section className="doi-reveal" style={{ borderBottom: '1px solid var(--border)' }}>
      <div className="doi-container doi-split-2" style={{ display: 'grid', gridTemplateColumns: '0.8fr 1.2fr', gap: 'var(--space-8)', padding: 'var(--section-pad-y) var(--section-pad-x)' }}>

        </div>
      </div>

  );
}

        <Media label="" ratio="1 / 1" src="assets/photos/Eric-Headshot.png" position="center 30%" overlay="linear-gradient(to top, rgba(10,11,12,0.45) 0%, rgba(10,11,12,0.08) 45%, rgba(10,11,12,0) 100%)" />

      <PageHero eyebrow="How it works" title="Async-first," emphasis="built for busy founders." lede="A clear path from diagnosis to momentum, run on your schedule. No weekly status calls, no micromanagement. Just senior marketing that ships and compounds." />
      <Marquee items={['Diagnose', 'Strategize', 'Execute', 'Report', 'Compound', 'Repeat']} />
      <Steps />
      <Communication />
      <Expect />
      <Testimonial />
      <CTABand heading="A process that respects" emphasis="your time." body="Start with a $497 diagnostic. You will have a 90-day roadmap in hand within the first week." primary="Book a Diagnostic" secondary="See engagements" secondaryHref="services.html" />

}

window.__DOI_PAGE__ = 'process';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
