<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Doi Website · Doi Marketing + Design Co.</title>
<link rel="stylesheet" href="_ds/doi-marketing-design-design-system-a12e37a5-0985-449c-9ced-7d3f11cd107f/styles.css" />
<link rel="stylesheet" href="shared/site.css" />
<link rel="icon" href="assets/logos/Doi-Icon-darkBK.svg" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/doi-marketing-design-design-system-a12e37a5-0985-449c-9ced-7d3f11cd107f/_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared/shell.jsx"></script>
<script type="text/babel" src="shared/case.jsx"></script>

<script type="text/babel">
const { Marquee } = window.DOIMarketingDesignDesignSystem_a12e37;
const { Nav, Footer, CTABand } = window.DOIShell;
const { CaseHero, Section, Prose, ChallengeCards, DarkCallout, PullQuote, CaseFootNav } = window.DOICase;

const challenge = [
  { number: '01', tag: 'Positioning', title: 'Director, not freelancer', body: 'How do you present yourself as a fractional marketing director without looking like a freelancer, an agency, or someone between jobs?' },
  { number: '02', tag: 'Messaging', title: 'Confidence without bragging', body: 'The founder tends to undersell. The site needed to project the confidence the work deserves without feeling like bragging.' },
  { number: '03', tag: 'Design', title: 'A deliberate risk', body: 'A safe, light, template-looking site would contradict everything the brand stands for. Going dark and premium was a deliberate risk.' },
];

const decisions = [
  { n: '01', t: 'Fractional Director, not Freelancer', d: 'The same work, presented differently, commands a different rate and attracts a different client. One word change repositions the entire offer.' },
  { n: '02', t: 'Dark Aesthetic Over Safe Template', d: 'Every marketing freelancer\u2019s site looks the same. Going dark is a filter — it attracts clients who value premium positioning and repels those looking for the cheapest option.' },
  { n: '03', t: 'Built with AI, Unapologetically', d: 'The site was built entirely with Claude AI. The design decisions, strategy, copy direction, and aesthetic are entirely the founder\u2019s. Using AI to execute faster is a skill, not a cheat.' },
  { n: '04', t: 'Two Domains, One Person', d: 'doimarketingdesign.com for clients. doidesign.co for employers. Two audiences, two contexts, zero confusion.' },
  { n: '05', t: 'Pricing in Plain Sight', d: 'Hiding pricing is a signal of insecurity. Transparent pricing filters for clients who already see the value.' },
];

const architecture = [
  { k: 'Hero', v: 'Sets the aesthetic. First impression, no second chances.' },
  { k: 'Marquee', v: 'Communicates range without cluttering the hero.' },
  { k: 'About', v: 'Answers \u201cwho is this?\u201d before they ask.' },
  { k: 'Services', v: 'Answers \u201cwhat do I get and what does it cost?\u201d' },
  { k: 'Work', v: 'Answers \u201chas this person done work like mine?\u201d' },
  { k: 'Industries', v: 'Answers \u201cdo they know my world?\u201d' },
  { k: 'Process', v: 'Answers \u201cwhat does working together look like?\u201d' },
  { k: 'Testimonial', v: 'Answers \u201ccan I trust this person?\u201d' },
  { k: 'CTA', v: 'One clear action. Low commitment, high value.' },
];

function DecisionList() {
  return (
    <div style={{ borderTop: '1px solid var(--border)' }}>
      {decisions.map((d) => (
        <div key={d.n} className="doi-split-2" style={{ display: 'grid', gridTemplateColumns: '0.85fr 1.15fr', gap: 'var(--space-7)', alignItems: 'start', padding: 'var(--space-7) 0', borderBottom: '1px solid var(--border)' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 'var(--space-5)' }}>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 'var(--text-number)', lineHeight: 0.9, color: 'var(--crimson)' }}>{d.n}</span>
            <h3 style={{ fontFamily: 'var(--font-editorial)', fontWeight: 400, fontSize: 'clamp(1.5rem, 2.2vw, 2.1rem)', lineHeight: 1.1, color: 'var(--text-primary)', margin: 0 }}>{d.t}</h3>
          </div>
          <p style={{ margin: 0, fontSize: 'var(--text-body)', lineHeight: 'var(--lh-body)', color: 'var(--text-secondary)', maxWidth: '54ch', paddingTop: 6 }}>{d.d}</p>
        </div>
      ))}
    </div>
  );
}

function ArchList() {
  return (
    <div style={{ borderTop: '1px solid var(--border)' }}>
      {architecture.map((r, i) => (
        <div key={r.k} className="doi-row-between" style={{ display: 'flex', gap: 'var(--space-6)', alignItems: 'baseline', padding: 'var(--space-5) 0', borderBottom: '1px solid var(--border)' }}>
          <span style={{ flex: '0 0 30%', display: 'flex', alignItems: 'baseline', gap: 16 }}>
            <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', color: 'var(--text-muted)' }}>{String(i + 1).padStart(2, '0')}</span>
            <span className="doi-display" style={{ fontSize: '1.6rem' }}>{r.k}</span>
          </span>
          <span style={{ fontFamily: 'var(--font-body)', fontWeight: 300, fontSize: 'var(--text-body)', lineHeight: 1.6, color: 'var(--text-primary)' }}>{r.v}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  React.useEffect(() => { window.DOIShell.initReveal(); }, []);
  return (
    <div style={{ background: 'var(--bg)' }}>
      <Nav />
      <CaseHero
        eyebrow="Case Study — Brand Strategy + Web Design"
        title="Doi Marketing + Design Co. Website"
        subtitle="Positioning, Architecture, Copywriting, Visual Design"
        label="Self-initiated"
        meta={[
          { k: 'Type', v: 'Brand + Web' },
          { k: 'Platform', v: 'Claude AI' },
          { k: 'Goal', v: 'First Client' },
          { k: 'Year', v: '2025' },
        ]}
        mediaLabel="" mediaSrc="assets/photos/Doi-Website-tile.jpg" mediaPosition="center"
      />

      <Marquee items={['Positioning', 'Architecture', 'Copy', 'Design', 'Strategy', 'Conversion']} />

      <Section eyebrow="The Challenge" headline={<>Three problems in <em style={{ fontStyle: 'italic', color: 'var(--crimson)' }}>one brief.</em></>}>
        <ChallengeCards items={challenge} cols={3} />
      </Section>

      <Section eyebrow="The Decisions" headline={<>Five calls that <em style={{ fontStyle: 'italic', color: 'var(--text-secondary)' }}>defined the brand.</em></>} glow>
        <DecisionList />
      </Section>

      <Section eyebrow="Architecture" headline={<>Every section <em style={{ fontStyle: 'italic', color: 'var(--text-secondary)' }}>earns its place.</em></>}>
        <ArchList />
      </Section>

      <DarkCallout
        headline="BUILT WITH AI. DESIGNED WITH INTENTION."
        sub="Every decision is mine."
        body="The site was built entirely with Claude AI. This is not a footnote — it\u2019s a feature. It demonstrates the founder\u2019s core belief: professionals who use AI tools intelligently will outperform those who don\u2019t, every time. The design decisions, brand strategy, copy direction, and aesthetic are entirely Eric\u2019s. Claude was the tool. The thinking was human."
      />

      <Section eyebrow="The Goal" headline={<>One metric. <em style={{ fontStyle: 'italic', color: 'var(--crimson)' }}>First client.</em></>}>
        <Prose max="72ch">
          The first few clients are the hardest. Once the work exists and a testimonial can be earned, the site becomes self-sustaining. The diagnostic offer ($497) is the designed entry point — low commitment, high value, built to convert to a retainer. The site is not finished when it launches. It gets stronger with every real project added.
        </Prose>
      </Section>

      <PullQuote cite="The brief, distilled">
        &ldquo;A website is not a brochure. It is the brands first handshake, and it either <em style={{ fontStyle: 'italic', color: 'var(--crimson)' }}>earns the next conversation</em> or ends it.&rdquo;
      </PullQuote>

      <CaseFootNav
        prev={{ href: 'case-brand.html', label: 'Doi Brand Identity' }}
        next={{ href: 'work.html', label: 'All Selected Work' }}
      />

      <CTABand heading="Ready for a site that" emphasis="actually converts?" body="Every engagement starts with a $497 diagnostic and a 90-day roadmap. See exactly where your brand can grow next." primary="Book a Diagnostic" secondary="See more work" secondaryHref="work.html" />
      <Footer />
    </div>
  );
}

window.__DOI_PAGE__ = 'work';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
